<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#0F1D2A"/>
    </linearGradient>
    <linearGradient id="beam" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9945FF"/>
      <stop offset="100%" stop-color="#14F195"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14F195" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#9945FF" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <clipPath id="round">
      <rect width="120" height="120" rx="26"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="120" height="120" rx="26" fill="url(#bg)"/>

  <!-- Subtle glow blob -->
  <ellipse cx="60" cy="55" rx="50" ry="45" fill="url(#glow)" filter="url(#blur)"/>

  <!-- Solana-style beam marks (3 parallel diagonal bars) -->
  <!-- Bottom bar -->
  <path d="M28 82 L62 82 Q66 82 63 86 L27 86 Q23 86 26 82 Z" fill="url(#beam)" opacity="1"/>
  <!-- Middle bar -->
  <path d="M34 62 L81 62 Q85 62 82 66 L35 66 Q31 66 34 62 Z" fill="url(#beam)" opacity="0.85"/>
  <!-- Top bar -->
  <path d="M40 42 L92 42 Q96 42 93 46 L41 46 Q37 46 40 42 Z" fill="url(#beam)" opacity="0.7"/>

  <!-- Small green dot accent -->
  <circle cx="90" cy="30" r="5" fill="#14F195" opacity="0.9"/>
  <circle cx="90" cy="30" r="9" fill="#14F195" opacity="0.15"/>
</svg>
